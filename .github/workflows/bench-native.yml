name: Benchmark (benchmark-action JSON format)

# Tests: benchmark-action format parsing (explicit), auto-detection, and step summary output.
# Generates results with small random variation to build up realistic time-series data.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  bench-native:
    name: benchmark-action JSON benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate benchmark results with variation
        run: |
          node - <<'EOF'
          const vary = (base, pct = 0.05) => Math.round(base * (1 + (Math.random() * 2 - 1) * pct));
          const results = [
            { name: "SearchAlgorithms/linear",              value: vary(245),     unit: "ns/op" },
            { name: "SearchAlgorithms/linear/throughput",    value: vary(125000),  unit: "ops/sec" },
            { name: "SearchAlgorithms/binary",              value: vary(45),      unit: "ns/op" },
            { name: "SearchAlgorithms/binary/throughput",    value: vary(850000),  unit: "ops/sec" },
            { name: "SearchAlgorithms/hash",                value: vary(12),      unit: "ns/op" },
            { name: "SearchAlgorithms/hash/throughput",      value: vary(3200000), unit: "ops/sec" },
            { name: "DataStructures/btree-insert",          value: vary(890),     unit: "ns/op" },
            { name: "DataStructures/btree-insert/bytes_per_op", value: vary(128, 0.02), unit: "B/op" },
            { name: "DataStructures/btree-delete",          value: vary(340),     unit: "ns/op" },
            { name: "DataStructures/btree-lookup",          value: vary(78),      unit: "ns/op" },
          ];
          require("fs").writeFileSync("bench-results.json", JSON.stringify(results, null, 2) + "\n");
          console.log("Generated:", JSON.stringify(results, null, 2));
          EOF

      - name: Stash results (explicit benchmark-action format)
        uses: strawgate/benchkit/actions/stash@main-dist
        with:
          results: bench-results.json
          format: benchmark-action
          summary: true

      - name: Trigger aggregate
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run aggregate.yml --repo ${{ github.repository }}
