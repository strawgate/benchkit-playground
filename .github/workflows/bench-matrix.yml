name: Benchmark (matrix build)

# Tests: collision-proof run-id with matrix keys, concurrent stash writes,
# and multiple series in a single aggregated view.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  bench-variant:
    name: Benchmark (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [fast, balanced, thorough]
    steps:
      - uses: actions/checkout@v4

      - name: Generate benchmark results for ${{ matrix.variant }}
        run: |
          python3 - <<'EOF'
          import random, json, os

          variant = os.environ["VARIANT"]

          # Each variant represents a different algorithm implementation
          profiles = {
              "fast":      {"ns_per_op": 890,  "accuracy": 0.72, "memory_mb": 12},
              "balanced":  {"ns_per_op": 2340, "accuracy": 0.91, "memory_mb": 45},
              "thorough":  {"ns_per_op": 8920, "accuracy": 0.99, "memory_mb": 128},
          }

          def vary(base, pct=0.04):
              return round(base * (1 + random.uniform(-pct, pct)), 3)

          p = profiles[variant]
          results = [
              {"name": "SolverAlgorithm",            "value": vary(p["ns_per_op"]),       "unit": "ns/op"},
              {"name": "SolverAlgorithm/accuracy",    "value": vary(p["accuracy"], 0.01),  "unit": "score"},
              {"name": "SolverAlgorithm/memory_mb",   "value": vary(p["memory_mb"], 0.02), "unit": "MB"},
          ]
          with open("bench-results.json", "w") as f:
              json.dump(results, f, indent=2)
              f.write("\n")
          print(f"Generated {variant} results:", json.dumps(results, indent=2))
          EOF
        env:
          VARIANT: ${{ matrix.variant }}

      - name: Stash results
        uses: strawgate/benchkit/actions/stash@main-dist
        with:
          results: bench-results.json
          format: benchmark-action
          # Matrix jobs share the same GITHUB_JOB name, so we must include
          # the matrix key in the run-id to avoid file collisions.
          run-id: ${{ github.run_id }}-${{ github.run_attempt }}--bench-variant-${{ matrix.variant }}
          summary: true

      - name: Trigger aggregate (only from one matrix variant to avoid duplicates)
        if: matrix.variant == 'fast'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run aggregate.yml --repo ${{ github.repository }}
